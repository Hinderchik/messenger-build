<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Чат - Messenger</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-container">
        <!-- Боковая панель -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="user-info">
                    <div class="avatar" id="userAvatar"></div>
                    <div class="user-details">
                        <h3 id="username"></h3>
                        <span class="user-status" id="userStatus">В сети</span>
                    </div>
                </div>
                <div class="header-actions">
                    <button class="icon-btn" onclick="window.location.href='settings.html'">⚙️</button>
                    <button id="logoutBtn" class="icon-btn" title="Выйти">🚪</button>
                </div>
            </div>
            
            <div class="search-container">
                <input type="text" id="searchUsers" class="search-input" placeholder="Поиск по нику...">
            </div>
            
            <div class="tabs">
                <button class="tab active" data-tab="chats">Чаты</button>
                <button class="tab" data-tab="users">Контакты</button>
                <button class="tab" data-tab="channels">Каналы</button>
            </div>
            
            <div class="chats-list" id="chatsList"></div>
            <div class="users-list" id="usersList" style="display: none;"></div>
            <div class="channels-list" id="channelsList" style="display: none;"></div>
        </div>
        
        <!-- Область чата -->
        <div class="chat-area">
            <div class="chat-header" id="chatHeader" style="display: none;">
                <button class="back-button" id="backButton">←</button>
                <div class="chat-header-info">
                    <h3 id="chatUserName"></h3>
                    <span class="chat-header-status" id="onlineStatus"></span>
                </div>
                <div class="chat-actions">
                    <button class="chat-action-btn" title="Поиск">🔍</button>
                    <button class="chat-action-btn" title="Ещё">⋯</button>
                </div>
            </div>
            
            <div class="messages-area" id="messagesArea">
                <div class="empty-chat">Выберите чат для начала общения</div>
            </div>
            
            <div class="typing-indicator" id="typingIndicator" style="display: none;">
                Печатает...
            </div>
            
            <div class="input-area" id="inputArea" style="display: none;">
                <button class="attach-btn" id="attachBtn">📎</button>
                <input type="text" id="messageInput" class="message-input" placeholder="Сообщение..." autocomplete="off">
                <button id="sendBtn" class="send-btn">📤</button>
            </div>
        </div>
    </div>
    <button class="fab" id="fabBtn">+</button>
    <div class="modal" id="createModal">
        <div class="modal-content">
            <h3>Создать</h3>
            <select id="createType">
                <option value="group">Группу</option>
                <option value="channel">Канал</option>
            </select>
            <input type="text" id="createName" placeholder="Название">
            <div class="modal-buttons">
                <button id="cancelModal">Отмена</button>
                <button id="confirmCreate">Создать</button>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <script src="app.js"></script>
</body>
</html>
