name: Build Messenger APK & EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout messenger-build
        uses: actions/checkout@v4
        with:
          path: messenger-build
          
      - name: Checkout messenger-app
        uses: actions/checkout@v4
        with:
          repository: Hinderchik/messenger-app
          path: messenger-app
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install PWABuilder CLI
        run: npm install -g @pwabuilder/cli
        
      - name: Copy icon from messenger-build
        run: |
          cd messenger-app
          cp ../messenger-build/icon.png icon.png 2>/dev/null || echo "No icon found"
          
      - name: Create manifest.json
        run: |
          cd messenger-app
          cat > manifest.json << 'EOF'
          {
            "name": "c.c.",
            "short_name": "c.c.",
            "start_url": "/",
            "display": "standalone",
            "background_color": "#4F46E5",
            "theme_color": "#4F46E5",
            "icons": [
              {"src": "icon.png", "sizes": "512x512", "type": "image/png"}
            ]
          }
          EOF
          
      - name: Build APK
        run: |
          cd messenger-app
          npx @pwabuilder/cli build
          
          find . -type f -name "*.apk" 2>/dev/null | head -1 | xargs -I {} cp {} ../c.c.apk
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: c.c.apk
          path: c.c.apk

  build-exe:
    runs-on: windows-latest
    steps:
      - name: Checkout messenger-build
        uses: actions/checkout@v4
        with:
          path: messenger-build
          
      - name: Checkout messenger-app
        uses: actions/checkout@v4
        with:
          repository: Hinderchik/messenger-app
          path: messenger-app
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Create Electron app
        shell: bash
        run: |
          mkdir electron-app
          cd electron-app
          
          cp ../messenger-build/icon.png icon.png 2>/dev/null || echo "No icon"
          
          if [ -f "icon.png" ]; then
            npm install -g png-to-ico
            png-to-ico icon.png > icon.ico
          fi
          
          cat > package.json << 'EOF'
          {
            "name": "cc-messenger",
            "version": "1.0.0",
            "description": "c.c. Messenger",
            "author": "XunKal1",
            "main": "main.js",
            "scripts": {
              "dist": "electron-builder"
            },
            "build": {
              "appId": "com.cc.messenger",
              "productName": "c.c.",
              "directories": {"output": "dist"},
              "files": ["**/*"],
              "win": {
                "target": "nsis",
                "icon": "icon.ico"
              },
              "nsis": {
                "oneClick": false,
                "perMachine": true,
                "allowToChangeInstallationDirectory": true
              }
            },
            "devDependencies": {
              "electron": "^28.0.0",
              "electron-builder": "^24.6.4"
            }
          }
          EOF
          
          cat > main.js << 'EOF'
          const { app, BrowserWindow } = require('electron');
          function createWindow() {
            const win = new BrowserWindow({
              width: 1200,
              height: 800,
              icon: 'icon.ico',
              webPreferences: { nodeIntegration: false, contextIsolation: true }
            });
            win.loadURL('https://hindershik.github.io/messenger-app');
          }
          app.whenReady().then(createWindow);
          EOF
          
          npm install
          
      - name: Build EXE
        shell: bash
        run: |
          cd electron-app
          npm run dist
          
          if [ -f "dist/c.c Setup 1.0.0.exe" ]; then
            cp "dist/c.c Setup 1.0.0.exe" ../c.c.exe
          elif [ -f "dist/c.c. Setup 1.0.0.exe" ]; then
            cp "dist/c.c. Setup 1.0.0.exe" ../c.c.exe
          else
            find dist -name "*.exe" -exec cp {} ../c.c.exe \;
          fi
          
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: c.c.exe
          path: c.c.exe

  create-release:
    needs: [build-apk, build-exe]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          
      - name: List files
        run: |
          ls -la artifacts/
          ls -la artifacts/c.c.apk/ || true
          ls -la artifacts/c.c.exe/ || true
          
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "c.c. Messenger v1.0.${{ github.run_number }}"
          files: |
            artifacts/c.c.apk/c.c.apk
            artifacts/c.c.exe/c.c.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}