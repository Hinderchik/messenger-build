name: Build Messenger APK & EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout messenger-build (иконка)
        uses: actions/checkout@v4
        with:
          path: messenger-build
          
      - name: Checkout messenger-app (приложение)
        uses: actions/checkout@v4
        with:
          repository: Hinderchik/messenger-app
          path: messenger-app
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli
        
      - name: Copy icon
        run: |
          cd messenger-app
          cp ../messenger-build/icon.png icon.png 2>/dev/null || echo "No icon"
          
      - name: Create manifest.json
        run: |
          cd messenger-app
          cat > manifest.json << 'EOF'
          {
            "name": "c.c.",
            "short_name": "c.c.",
            "start_url": "/",
            "display": "standalone",
            "background_color": "#4F46E5",
            "theme_color": "#4F46E5",
            "icons": [
              {
                "src": "icon.png",
                "sizes": "512x512",
                "type": "image/png"
              }
            ]
          }
          EOF
          
      - name: Build APK with Bubblewrap
        run: |
          cd messenger-app
          echo "y" | npx @bubblewrap/cli init --manifest manifest.json
          npx @bubblewrap/cli build
          find . -name "*.apk" -exec cp {} ../c.c.apk \;
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: c.c.apk
          path: c.c.apk

  build-exe:
    runs-on: windows-latest
    steps:
      - name: Checkout messenger-build
        uses: actions/checkout@v4
        with:
          path: messenger-build
          
      - name: Checkout messenger-app
        uses: actions/checkout@v4
        with:
          repository: Hinderchik/messenger-app
          path: messenger-app
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Build EXE with Electron
        shell: bash
        run: |
          mkdir electron-app && cd electron-app
          
          # Копируем иконку
          cp ../messenger-build/icon.png icon.png 2>/dev/null
          
          # Конвертируем в ICO
          if [ -f "icon.png" ]; then
            npm install -g png-to-ico
            png-to-ico icon.png > icon.ico
          fi
          
          # package.json
          cat > package.json << 'EOF'
          {
            "name": "cc-messenger",
            "version": "1.0.0",
            "description": "c.c. Messenger",
            "author": "XunKal1",
            "main": "main.js",
            "scripts": {"dist": "electron-builder"},
            "build": {
              "appId": "com.cc.messenger",
              "productName": "c.c.",
              "win": {"target": "nsis", "icon": "icon.ico"},
              "nsis": {"oneClick": false, "perMachine": true}
            },
            "devDependencies": {
              "electron": "^28.0.0",
              "electron-builder": "^24.6.4"
            }
          }
          EOF
          
          # main.js
          cat > main.js << 'EOF'
          const { app, BrowserWindow } = require('electron');
          function createWindow() {
            const win = new BrowserWindow({
              width: 1200,
              height: 800,
              icon: 'icon.ico',
              webPreferences: { nodeIntegration: false, contextIsolation: true }
            });
            win.loadURL('https://hindershik.github.io/messenger-app');
          }
          app.whenReady().then(createWindow);
          EOF
          
          npm install
          npm run dist
          
          # Копируем EXE
          find dist -name "*.exe" -exec cp {} ../c.c.exe \;
          
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: c.c.exe
          path: c.c.exe

  create-release:
    needs: [build-apk, build-exe]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "c.c. v1.0.${{ github.run_number }}"
          files: |
            artifacts/c.c.apk/c.c.apk
            artifacts/c.c.exe/c.c.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}