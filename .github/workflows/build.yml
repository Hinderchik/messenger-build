name: Build c.c APK and EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        
      - name: Clone web app
        run: |
          git clone https://github.com/Hinderchik/messenger-app.git webapp
          mkdir -p www
          cp -r webapp/* www/
          
      - name: Install Capacitor
        run: |
          npm install -g @capacitor/cli
          npm install @capacitor/core @capacitor/android
          
      - name: Init Capacitor
        run: cap init c.c com.cc.messenger --web-dir=www
        
      - name: Remove old android
        run: rm -rf android || true
        
      - name: Add Android
        run: cap add android
        
      - name: Force Java 17 in gradle files
        run: |
          cd android
          # Создаём gradle.properties с Java 17
          echo "org.gradle.jvmargs=-Xmx2048m" >> gradle.properties
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          
          # Исправляем sourceCompatibility в app/build.gradle
          sed -i 's/sourceCompatibility = .*/sourceCompatibility = JavaVersion.VERSION_17/' app/build.gradle
          sed -i 's/targetCompatibility = .*/targetCompatibility = JavaVersion.VERSION_17/' app/build.gradle
          
          # Добавляем Java 17 если нет
          grep -q "sourceCompatibility" app/build.gradle || \
            sed -i '/android {/a\\    compileOptions {\n        sourceCompatibility JavaVersion.VERSION_17\n        targetCompatibility JavaVersion.VERSION_17\n    }' app/build.gradle
          
      - name: Sync Capacitor
        run: cap sync
        
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: c.c-android
          path: android/app/build/outputs/apk/release/*.apk

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Clone web app
        run: git clone https://github.com/Hinderchik/messenger-app.git webapp
        
      - name: Create Electron app
        run: |
          mkdir electron-app
          cd electron-app
          npm init -y
          npm install electron electron-builder
          
          $mainJs = @"
          const { app, BrowserWindow } = require('electron');
          let mainWindow;
          function createWindow() {
              mainWindow = new BrowserWindow({
                  width: 1200,
                  height: 800,
                  webPreferences: {
                      nodeIntegration: false,
                      contextIsolation: true
                  }
              });
              mainWindow.loadURL('https://messenger-e8ywossf0-hinderchiks-projects.vercel.app');
              mainWindow.on('closed', () => { mainWindow = null; });
          }
          app.whenReady().then(createWindow);
          app.on('window-all-closed', () => {
              if (process.platform !== 'darwin') app.quit();
          });
          "@
          $mainJs | Out-File -FilePath main.js -Encoding UTF8
          
          $packageJson = @"
          {
            "name": "c.c",
            "version": "1.0.0",
            "main": "main.js",
            "scripts": {
              "start": "electron .",
              "build": "electron-builder"
            },
            "build": {
              "appId": "com.cc.messenger",
              "productName": "c.c",
              "directories": {
                "output": "dist"
              },
              "win": {
                "target": "nsis"
              }
            }
          }
          "@
          $packageJson | Out-File -FilePath package.json -Encoding UTF8
          
      - name: Build EXE
        run: |
          cd electron-app
          npm run build
          
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: c.c-windows
          path: electron-app/dist/*.exe

  create-release:
    needs: [build-android, build-windows]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: c.c v1.0.${{ github.run_number }}
          files: |
            artifacts/c.c-android/*.apk
            artifacts/c.c-windows/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}