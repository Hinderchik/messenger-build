name: Build c.c APK & EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Create manifest.json
        run: |
          cat > manifest.json << 'EOF'
          {
            "name": "c.c",
            "short_name": "c.c",
            "start_url": "https://messenger-e8ywossf0-hinderchiks-projects.vercel.app",
            "display": "standalone",
            "theme_color": "#667eea",
            "background_color": "#ffffff",
            "icons": [
              {
                "src": "https://raw.githubusercontent.com/Hinderchik/messenger-app/main/icon.png",
                "sizes": "512x512",
                "type": "image/png",
                "purpose": "any maskable"
              }
            ]
          }
          EOF
          
      - name: Install PWABuilder
        run: npm install -g @pwabuilder/cli
        
      - name: Build APK
        run: pwabuilder package --manifest manifest.json --platform android
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: c.c-android
          path: |
            **/*.apk
            !**/node_modules/**
            
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Create icon.ico
        run: |
          curl -o icon.png https://raw.githubusercontent.com/Hinderchik/messenger-app/main/icon.png
          if (Test-Path icon.png) {
            magick icon.png -define icon:auto-resize=256,128,96,64,48,32,16 icon.ico
          }
          
      - name: Create Electron app
        run: |
          mkdir electron-app
          cd electron-app
          npm init -y
          npm install electron electron-builder
          if (Test-Path ../icon.ico) { Copy-Item ../icon.ico . }
          
          @"
          const { app, BrowserWindow } = require('electron');
          let mainWindow;
          function createWindow() {
              mainWindow = new BrowserWindow({
                  width: 1200,
                  height: 800,
                  icon: __dirname + '/icon.ico',
                  webPreferences: { nodeIntegration: false, contextIsolation: true }
              });
              mainWindow.loadURL('https://messenger-e8ywossf0-hinderchiks-projects.vercel.app');
              mainWindow.on('closed', () => { mainWindow = null; });
          }
          app.whenReady().then(createWindow);
          app.on('window-all-closed', () => { if (process.platform !== 'darwin') app.quit(); });
          "@ | Out-File -FilePath main.js -Encoding UTF8
          
          @"
          {
            "name": "c.c",
            "version": "1.0.0",
            "main": "main.js",
            "scripts": { "start": "electron .", "build": "electron-builder" },
            "build": {
              "appId": "com.cc.messenger",
              "productName": "c.c",
              "directories": { "output": "dist" },
              "win": { "target": "nsis", "icon": "icon.ico" }
            }
          }
          "@ | Out-File -FilePath package.json -Encoding UTF8
          
      - name: Build EXE
        run: |
          cd electron-app
          npm run build
          
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: c.c-windows
          path: electron-app/dist/*.exe

  create-release:
    needs: [build-android, build-windows]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: c.c v1.0.${{ github.run_number }}
          files: |
            artifacts/**/*.apk
            artifacts/**/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}