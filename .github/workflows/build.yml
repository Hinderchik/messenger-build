name: Build Messenger Apps

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Clone web app
        run: |
          git clone https://github.com/Hinderchik/messenger-app.git webapp
          cp -r webapp/* .
          
      - name: Create manifest.json
        run: |
          cat > manifest.json << 'EOF'
          {
            "name": "c.c Messenger",
            "short_name": "c.c",
            "start_url": "/chat.html",
            "display": "standalone",
            "theme_color": "#17212b",
            "background_color": "#17212b",
            "icons": [
              {
                "src": "icon.png",
                "sizes": "512x512",
                "type": "image/png",
                "purpose": "any maskable"
              }
            ]
          }
          EOF
          
      - name: Install PWABuilder
        run: npm install -g @pwabuilder/cli
        
      - name: Build APK
        run: |
          pwabuilder package --manifest manifest.json --platform android
          mkdir -p apk_output
          find . -name "*.apk" -exec cp {} apk_output/ \;
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: c.c-android
          path: apk_output/*.apk

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Clone web app
        run: git clone https://github.com/Hinderchik/messenger-app.git webapp
        
      - name: Create Electron app
        run: |
          mkdir electron-app
          cd electron-app
          npm init -y
          npm install electron electron-builder
          
          Copy-Item ../icon.png .
          
          @"
          const { app, BrowserWindow, Menu } = require('electron');
          let mainWindow;
          
          function createWindow() {
              mainWindow = new BrowserWindow({
                  width: 1200,
                  height: 800,
                  minWidth: 800,
                  minHeight: 600,
                  icon: __dirname + '/icon.png',
                  webPreferences: {
                      nodeIntegration: false,
                      contextIsolation: true
                  }
              });
              
              mainWindow.loadURL('https://messenger-app-roan-two.vercel.app');
              
              const menu = Menu.buildFromTemplate([
                  { label: 'c.c', submenu: [{ label: 'Выход', role: 'quit' }] },
                  { label: 'Правка', submenu: [{ label: 'Копировать', role: 'copy' }, { label: 'Вставить', role: 'paste' }] },
                  { label: 'Вид', submenu: [{ label: 'Перезагрузить', role: 'reload' }, { label: 'Полный экран', role: 'togglefullscreen' }] }
              ]);
              Menu.setApplicationMenu(menu);
              
              mainWindow.on('closed', () => { mainWindow = null; });
          }
          
          app.whenReady().then(createWindow);
          app.on('window-all-closed', () => { if (process.platform !== 'darwin') app.quit(); });
          "@ | Out-File -FilePath main.js -Encoding UTF8
          
          @"
          {
            "name": "c.c",
            "version": "1.0.0",
            "main": "main.js",
            "scripts": {
              "start": "electron .",
              "build": "electron-builder"
            },
            "build": {
              "appId": "com.cc.messenger",
              "productName": "c.c",
              "directories": { "output": "dist" },
              "win": { "target": "nsis", "icon": "icon.png" }
            }
          }
          "@ | Out-File -FilePath package.json -Encoding UTF8
          
      - name: Build EXE
        run: |
          cd electron-app
          npm run build
          
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: c.c-windows
          path: electron-app/dist/*.exe

  create-release:
    needs: [build-android, build-windows]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: c.c Messenger v1.0.${{ github.run_number }}
          files: |
            artifacts/c.c-android/*.apk
            artifacts/c.c-windows/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
