name: Build c.c APK & EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        
      - name: Clone web app
        run: |
          git clone https://github.com/Hinderchik/messenger-app.git webapp
          mkdir -p www
          cp -r webapp/* www/
          
      - name: Install Capacitor
        run: |
          npm install -g @capacitor/cli
          npm install @capacitor/core @capacitor/android
          
      - name: Init Capacitor
        run: cap init c.c com.cc.messenger --web-dir=www
        
      - name: Add Android
        run: cap add android
        
      - name: Create icons
        run: |
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
          
          echo "ic_launcher" > android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          echo "ic_launcher" > android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          echo "ic_launcher" > android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          echo "ic_launcher" > android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          echo "ic_launcher" > android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          
      - name: Sync Capacitor
        run: cap sync
        
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
          
      - name: Rename APK
        run: |
          cp android/app/build/outputs/apk/release/app-release.apk c.c.apk
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: c.c-android
          path: c.c.apk

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Clone web app
        run: git clone https://github.com/Hinderchik/messenger-app.git webapp
        
      - name: Create Electron app
        run: |
          mkdir electron-app
          cd electron-app
          npm init -y
          npm install electron electron-builder
          
          $mainJs = @"
          const { app, BrowserWindow } = require('electron');
          let mainWindow;
          function createWindow() {
              mainWindow = new BrowserWindow({
                  width: 1200,
                  height: 800,
                  webPreferences: {
                      nodeIntegration: false,
                      contextIsolation: true
                  }
              });
              mainWindow.loadURL('https://messenger-e8ywossf0-hinderchiks-projects.vercel.app');
              mainWindow.on('closed', () => { mainWindow = null; });
          }
          app.whenReady().then(createWindow);
          app.on('window-all-closed', () => {
              if (process.platform !== 'darwin') app.quit();
          });
          "@
          $mainJs | Out-File -FilePath main.js -Encoding UTF8
          
          $packageJson = @"
          {
            "name": "c.c",
            "version": "1.0.0",
            "main": "main.js",
            "scripts": {
              "start": "electron .",
              "build": "electron-builder"
            },
            "build": {
              "appId": "com.cc.messenger",
              "productName": "c.c",
              "directories": {
                "output": "dist"
              },
              "win": {
                "target": "nsis"
              }
            }
          }
          "@
          $packageJson | Out-File -FilePath package.json -Encoding UTF8
          
      - name: Build EXE
        run: |
          cd electron-app
          npm run build
          
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: c.c-windows
          path: electron-app/dist/*.exe

  create-release:
    needs: [build-android, build-windows]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: c.c v1.0.${{ github.run_number }}
          files: |
            artifacts/c.c-android/c.c.apk
            artifacts/c.c-windows/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
