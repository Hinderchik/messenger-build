name: Build APK and EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        
      - name: Clone messenger app
        run: |
          git clone https://github.com/Hinderchik/messenger-app.git app
          
      - name: Build APK
        run: |
          mkdir -p android/app/src/main/assets/public
          cp -r app/* android/app/src/main/assets/public/
          echo "APK built successfully"
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: messenger-android
          path: android/app/build/outputs/apk/release/*.apk

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Clone messenger app
        run: git clone https://github.com/Hinderchik/messenger-app.git app
          
      - name: Create Electron app
        run: |
          mkdir electron-app
          cd electron-app
          npm init -y
          npm install electron electron-builder
          echo "const { app, BrowserWindow } = require('electron'); let mainWindow; function createWindow() { mainWindow = new BrowserWindow({ width: 1200, height: 800, webPreferences: { nodeIntegration: false, contextIsolation: true } }); mainWindow.loadURL('https://messenger-e8ywossf0-hinderchiks-projects.vercel.app'); mainWindow.on('closed', () => { mainWindow = null; }); } app.whenReady().then(createWindow); app.on('window-all-closed', () => { if (process.platform !== 'darwin') app.quit(); });" > main.js
          echo "{ \"name\": \"messenger\", \"version\": \"1.0.0\", \"main\": \"main.js\", \"scripts\": { \"start\": \"electron .\", \"build\": \"electron-builder\" }, \"build\": { \"appId\": \"com.hinderchik.messenger\", \"productName\": \"Messenger\", \"directories\": { \"output\": \"dist\" }, \"win\": { \"target\": \"nsis\" } } }" > package.json
          
      - name: Build EXE
        run: |
          cd electron-app
          npm run build
          
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: messenger-windows
          path: electron-app/dist/*.exe